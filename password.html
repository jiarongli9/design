<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div style="margin: 300px 20px;">
        <h1 style="margin: 40px 0px;">Welcome to Jiarong's site!</h1>
        <p>Enter the code! 🤗 <a href="mailto:jiarongli9@gmail.com" style="color:#FFE268">Email</a> me if you need it.</p>
        <input style="background-color: #ffffff; color: #000000;" type="password" id="password">
        <button onclick="checkPassword()">Submit</button>
    </div>
    <script>
        document.getElementById("password").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });

        async function checkPassword() {
            const password = document.getElementById("password").value;
            const page = getParameterByName('page') || 'project1.html';

            if (password.trim() === "") {
                alert("Please enter a password");
                return;
            }

            try {
                const response = await fetch('/check-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated) {
                        sessionStorage.setItem('authenticated', 'true');
                        window.location.href = page;
                    } else {
                        alert("Incorrect password");
                    }
                } else {
                    alert("Incorrect password");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while checking the password");
            }
        }

        function getParameterByName(name) {
            const url = window.location.href;
            name = name.replace(/[\[\]]/g, "\\$&");
            const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
                  results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, " "));
        }
    </script>
</body>
</html>
