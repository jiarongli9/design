<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JL Portfolio</title>
    <link rel="icon" type="image/x-icon" href="img/logo-jl-icon.svg">
    <link rel="stylesheet" href="styles.css">
    
</head>
<body >
    <div style="margin: 300px 20px;">
        <h1 style="margin: 40px 0px;">Welcome to Jiarong's site!</h1>
        <p>Please enter password 🤗</p>
        <input style="background-color: #ffffff; color: #000000;"  type="password" id="password">
        <button onclick="checkPassword()">Submit</button>
    </div>
    <script>
        document.getElementById("password").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });

        function checkPassword() {
            var password = document.getElementById("password").value;
            console.log("Entered password: " + password); // Debugging log
            var page = getParameterByName('page');
            console.log("Page to redirect: " + page); // Debugging log

            // Basic validation to check if the password field is empty
            if (password.trim() === "") {
                alert("Please enter a password");
                return;
            }

            // Compare the input password with the predefined value (consider hashing for real applications)
            if (password === "12345") {
                sessionStorage.setItem('authenticated', 'true');
                if (page) {
                    window.location.href = page;
                } else {
                    alert("No page specified for redirection");
                }
            } else {
                alert("Incorrect password");
            }
        }

        function getParameterByName(name) {
            var url = window.location.href;
            name = name.replace(/[\[\]]/g, "\\$&");
            var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
            var results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, " "));
        }
    </script>
    
</body>
</html>
